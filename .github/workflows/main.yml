name: Build and Deploy AI Stack

on:
  push:
    branches: [ main ] # Triggers on push to main branch

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # Set up Docker Buildx (required for advanced caching)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Login to GitHub Container Registry
      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.PERSONAL_TOKEN }}

      # Build and Push the Backend Image
      - name: Build and push Backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}-backend:latest
          # Magic: This uses GitHub's internal cache to skip unchanged layers
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Build and Push the Astro Admin Image
      - name: Build and push Admin
        uses: docker/build-push-action@v6
        with:
          context: ./admin
          push: true
          tags: ${{ env.REGISTRY }}/${{ github.repository }}-admin:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
